services:
  postgres:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_USER: jobpilot
      POSTGRES_PASSWORD: password
      POSTGRES_DB: jobpilot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U jobpilot -d jobpilot && psql -U jobpilot -d jobpilot -tAc \"CREATE EXTENSION IF NOT EXISTS vector; SELECT COUNT(*) FROM pg_extension WHERE extname='vector'\" | grep -q 1",
        ]
      interval: 5s
      retries: 5
      start_period: 10s

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://jobpilot:password@postgres:5432/jobpilot
      SECRET_KEY: dev-secret-change-in-production
      ALLOWED_ORIGINS: http://localhost:3000
      AUTH_DISABLED: "true"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      target: runner
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: dev-nextauth-secret
      AUTH_DISABLED: "true"
      NEXT_PUBLIC_AUTH_DISABLED: "true"
    depends_on:
      - backend

volumes:
  postgres_data:
