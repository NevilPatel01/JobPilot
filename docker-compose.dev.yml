# Hot-reload dev overlay. Use when host bind mounts work (e.g. repo on internal disk).
# On macOS with the repo on an external /Volumes path, Docker Desktop may fail to create
# bind mounts; use default `docker compose up` (built images, no host mounts) instead.
services:
  backend:
    command: uvicorn app.main:socket_app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app

  frontend:
    build:
      target: dev
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next_cache:/app/.next

volumes:
  frontend_node_modules:
  frontend_next_cache:
